<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHILO.IT</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="world"></canvas> 

    <div id="map-overlay" class="map-overlay">
        <div class="map-overlay-bg"></div>
        <div class="map-inner-container">
            <img id="overlay-img" src="" alt="">
            <button class="inner-map-close">&times;</button>
        </div>
    </div>

    <div id="intro-hint" class="hint-overlay">
        <div class="hint-content">
            <!-- Левая часть (Назад) -->
            <div class="hint-side left">
                <div class="hint-line"></div>
                <div class="hint-text">
                    <span>↑</span>
                    <p>ТЯНИ ВВЕРХ,<br>ЧТОБЫ ЛЕТЕТЬ ВПЕРЕД</p>
                </div>
            </div>
            
            <div class="hint-sphere"></div>
            
            <!-- Правая часть (Вперед) -->
            <div class="hint-side right">
                <div class="hint-line"></div>
                <div class="hint-text">
                    <p>ТЯНИ ВНИЗ,<br>ЧТОБЫ ВЕРНУТЬСЯ</p>
                    <span>↓</span>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-cursor">
        <img src="./assets/pointer@2x.png" alt="">
    </div>


    <nav>
        <div class="logo">PHILO.<span>IT</span></div>
        <ul class="nav-links">
            <li><a href="#" data-page="intro" class="nav-item">ВВЕДЕНИЕ</a></li>
            <li><a href="#" data-page="society" class="nav-item">ОБЩЕСТВО</a></li>
            <li><a href="#" data-page="structure" class="nav-item">СОЦ. СТРУКТУРА</a></li>
            <li><a href="#" data-page="dynamics" class="nav-item">ВИЗУАЛИЗАЦИЯ СИСТЕМЫ</a></li>
            <li><a href="#" data-page="global" class="nav-item">ГЛОБАЛИЗАЦИЯ</a></li>
            <li><a href="#" data-page="info_society" class="nav-item">ИНФ. ОБЩЕСТВО</a></li>
            <li><a href="#" data-page="conclusion" class="nav-item">ЗАКЛЮЧЕНИЕ</a></li>
        </ul>
    </nav>

    <main id="app">
        <div id="content-wrapper"></div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="js/main.js"></script>


    <div id="details-page" class="sliding-page">
        <div id="wave-container"></div>
        <div class="page-spacer"></div>
        <div class="page-container">
            <div id="page-line" class="page-line"></div>
            <div id="page-label" class="page-label">01</div> 
            <div id="details-content" class="page-body"></div>
            
        </div>
    </div>

    <div id="map-overlay" class="map-overlay">        
        <div class="map-overlay-bg"></div>
        <!-- Было: map-inner-container, Стало: zoom-area -->
        <div class="zoom-area">
            <img id="overlay-img" src="" alt="Map Detail View", draggable="false">
            <button class="inner-map-close">&times;</button>
        </div>
    </div>


</body>
</html>
